<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Smart Homework AI</title>
<link rel="stylesheet" href="style.css">
</head>
<div class="profile">

<h3>👤 Student Profile</h3>

<input id="studentName" placeholder="Enter your name">

<select id="studentClass">

<option>Class 5</option>
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>

</select>

<button onclick="saveProfile()">
💾 Save Profile
</button>

<p id="welcome"></p>

</div>
<body>

<img src="logo.png" class="logo">

<h1>Smart Homework AI 🤖</h1>

<p>Your AI Homework Helper 🚀</p>


<button onclick="toggleDarkMode()">
🌙 Dark Mode
</button>


<div class="subjects">

<button onclick="setSubject('Maths')">➗ Maths</button>

<button onclick="setSubject('Science')">🔬 Science</button>

<button onclick="setSubject('English')">📖 English</button>

<button onclick="setSubject('General Knowledge')">🌍 GK</button>

</div>


<div id="chatBox"></div>


<input type="file" id="pdfFile" accept=".pdf">


<textarea id="question" placeholder="तुमचा प्रश्न इथे लिहा..."></textarea>
<div class="quizBox">

<h2>📝 AI Quiz Generator</h2>
<div class="notesBox">

<h2>📚 AI Notes Generator</h2>
<div class="examBox">

<h2>📝 AI Exam Paper Generator</h2>

<input id="examSubject" placeholder="Enter Subject">

<select id="examQuestions">
<option>10 Questions</option>
<option>20 Questions</option>
<option>30 Questions</option>
</select>

<button onclick="generateExam()">
📝 Generate Paper
</button>

<div id="examResult">
Exam paper इथे दिसेल.
</div>

</div>
<input id="notesTopic" placeholder="Enter topic">

<button onclick="generateNotes()">
🤖 Generate Notes
</button>

<div id="notesResult">
Notes इथे दिसतील.
</div>

</div>
<input id="quizTopic" placeholder="Enter topic (Maths, Science...)">

<select id="quizCount">
<option>5 Questions</option>
<option>10 Questions</option>
<option>15 Questions</option>
</select>

<button onclick="generateQuiz()">
🤖 Generate Quiz
</button>

<div id="quizResult"></div>

</div>

<button onclick="getAnswer()">
Get Answer
</button>


<div id="answer">
Answer इथे दिसेल.
</div>


<button onclick="copyAnswer()">
Copy Answer
</button>
<button onclick="saveFavourite()">
⭐ Save Favourite
</button>

<div id="favouriteBox">
Favourite Answer इथे दिसेल.
</div>

<button onclick="showFavourite()">
📌 Show Favourite
</button>


<script>
    async function generateExam(){

let subject =
document.getElementById("examSubject").value;

let questions =
document.getElementById("examQuestions").value;


if(subject.trim()==""){

alert("Subject लिहा");

return;

}


document.getElementById("examResult").innerHTML =
"Exam paper तयार होत आहे... ⏳";


let response = await fetch(
"https://smart-homework-ai-ef6l.onrender.com/ask",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

question:
"Create a practice exam paper for "+subject+" with "+questions+" and answers"

})

});


let data = await response.json();


document.getElementById("examResult").innerHTML =
data.answer;


}
    async function generateNotes(){

let topic =
document.getElementById("notesTopic").value;


if(topic.trim()==""){

alert("Topic लिहा");

return;

}


document.getElementById("notesResult").innerHTML =
"Notes तयार होत आहेत... ⏳";


let response = await fetch(
"https://smart-homework-ai-ef6l.onrender.com/ask",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

question:
"Create simple student notes on "+topic+" with important points"

})

});


let data = await response.json();


document.getElementById("notesResult").innerHTML =
data.answer;


}
    function saveProfile(){

let name =
document.getElementById("studentName").value;

let studentClass =
document.getElementById("studentClass").value;


localStorage.setItem(
"studentName",
name
);


localStorage.setItem(
"studentClass",
studentClass
);


document.getElementById("welcome").innerHTML =
"👋 Welcome " + name + " (" + studentClass + ")";


}



window.onload=function(){

let name =
localStorage.getItem("studentName");

let studentClass =
localStorage.getItem("studentClass");


if(name){

document.getElementById("welcome").innerHTML =
"👋 Welcome " + name + " (" + studentClass + ")";

}

}

// Subject buttons

function setSubject(subject){

document.getElementById("question").value =
"Help me with " + subject + ": ";

}




// Dark Mode

function toggleDarkMode(){

document.body.classList.toggle("dark");

}




// Load old chat

window.onload=function(){

let oldChat =
localStorage.getItem("homeworkChat");

if(oldChat){

document.getElementById("chatBox").innerHTML =
oldChat;

}

}




async function getAnswer(){


let question =
document.getElementById("question").value;



if(question.trim()===""){

alert("कृपया प्रश्न लिहा.");

return;

}




let chatBox =
document.getElementById("chatBox");



chatBox.innerHTML +=

`
<div class="userMessage">
${question}
</div>
`;



document.getElementById("answer").innerHTML =
"AI विचार करत आहे... ⏳";




let response = await fetch(

"https://smart-homework-ai-ef6l.onrender.com/ask",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

question:question

})

}

);



let data =
await response.json();



let answerText =
data.answer;




let aiBox=document.createElement("div");

aiBox.className="aiMessage";

chatBox.appendChild(aiBox);



let i=0;


function typing(){


if(i < answerText.length){


aiBox.innerHTML +=
answerText.charAt(i);


i++;


setTimeout(typing,25);


}

else{


localStorage.setItem(
"homeworkChat",
chatBox.innerHTML
);


}


}


typing();



document.getElementById("answer").innerHTML =
answerText;


document.getElementById("question").value="";


}




function copyAnswer(){


let text =
document.getElementById("answer").innerText;


navigator.clipboard.writeText(text);


alert("Answer copied!");

}

function saveFavourite(){

let answer =
document.getElementById("answer").innerText;

localStorage.setItem(
"favouriteAnswer",
answer
);

alert("⭐ Favourite Answer Saved!");

}



function showFavourite(){

let favourite =
localStorage.getItem("favouriteAnswer");


if(favourite){

document.getElementById("favouriteBox").innerHTML =
favourite;

}

else{

alert("No Favourite Answer Saved");

}

}
async function generateQuiz(){

let topic = document.getElementById("quizTopic").value;

let count = document.getElementById("quizCount").value;


if(topic.trim()==""){

alert("Topic लिहा");

return;

}


document.getElementById("quizResult").innerHTML =
"Quiz तयार होत आहे... ⏳";


let response = await fetch(
"https://smart-homework-ai-ef6l.onrender.com/ask",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

question:
"Create a "+count+" quiz on "+topic+" with answers"

})

});


let data = await response.json();


document.getElementById("quizResult").innerHTML =
data.answer;


}
</script>

</body>

</html>
