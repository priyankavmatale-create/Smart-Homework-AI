<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Smart Homework AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<img src="logo.png" class="logo">

<h1>Smart Homework AI 🤖</h1>

<p>Your AI Homework Helper 🚀</p>

<div id="chatBox"></div>

<input type="file" id="pdfFile" accept=".pdf">

<br><br>

<textarea id="question" placeholder="तुमचा प्रश्न इथे लिहा..."></textarea>

<br>

<button onclick="getAnswer()">Get Answer</button>

<div id="answer">
    Answer इथे दिसेल.
</div>

<button onclick="copyAnswer()">Copy Answer</button>


<script>

async function getAnswer() {

    let question = document.getElementById("question").value;

    let pdf = document.getElementById("pdfFile").files[0];


    if(question.trim() === "") {

        alert("कृपया प्रश्न लिहा.");

        return;

    }


    let chatBox = document.getElementById("chatBox");


    chatBox.innerHTML += `
        <div class="userMessage">
            ${question}
        </div>
    `;


    document.getElementById("answer").innerHTML =
    "AI विचार करत आहे... ⏳";


    // PDF Upload

    if(pdf){

        let formData = new FormData();

        formData.append("pdf", pdf);


        await fetch(
        "https://smart-homework-ai-ef6l.onrender.com/upload-pdf",
        {

            method:"POST",

            body:formData

        });

    }



    // Ask AI

    let response = await fetch(
    "https://smart-homework-ai-ef6l.onrender.com/ask",
    {

        method:"POST",

        headers:{

            "Content-Type":"application/json"

        },

        body:JSON.stringify({

            question:question

        })

    });



    let data = await response.json();


    let answerText = data.answer;



    chatBox.innerHTML += `

        <div class="aiMessage">

        </div>

    `;


    let aiBox =
    chatBox.lastElementChild;



    aiBox.innerHTML = "";


    let i = 0;


    function typing(){

        if(i < answerText.length){

            aiBox.innerHTML += answerText.charAt(i);

            i++;

            setTimeout(typing,25);

        }

    }


    typing();



    document.getElementById("answer").innerHTML =
    answerText;


    document.getElementById("question").value = "";

}




function copyAnswer(){

    let text =
    document.getElementById("answer").innerText;


    navigator.clipboard.writeText(text);


    alert("Answer copied!");


}


</script>


</body>

</html>
